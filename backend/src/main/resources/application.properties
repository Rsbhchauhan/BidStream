spring.application.name=BidStream

# Server port
server.port=8080

# H2 File-Based Database Configuration (Persists data across restarts)
spring.datasource.url=jdbc:h2:file:./data/bidstream;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA & Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# Using Flyway for schema migrations, so turning off hibernate ddl-auto
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Flyway Configuration
spring.flyway.enabled=true
# Flyway will manage migrations in src/main/resources/db/migration

# Cloud Redis Configuration
# spring.data.redis.host=redis-11332.crce219.us-east-1-4.ec2.cloud.redislabs.com
# spring.data.redis.port=11332
# spring.data.redis.password=your_redis_password
# If your Redis Cloud requires SSL, uncomment the next line
# spring.data.redis.ssl.enabled=true

# JWT Security Property
# TODO: Use a strong, secure secret key in production
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expirationMs=86400000

# Multipart Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
