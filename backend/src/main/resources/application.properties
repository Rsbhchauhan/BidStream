spring.datasource.driver-class-name=org.postgresql.Driver

# JPA & Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=bidstream
# Using Flyway for schema migrations, so turning off hibernate ddl-auto
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.schemas=bidstream
spring.flyway.create-schemas=true
# Flyway will manage migrations in src/main/resources/db/migration

